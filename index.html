<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.Tech Placement Mock Test</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --bg: #f4f7f6; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Login Overlay */
        #login-page { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 1000; color: white; }
        .login-card { background: white; color: #333; padding: 40px; border-radius: 12px; width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-card h2 { margin-top: 0; color: var(--primary); text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        /* Sidebar & Timer */
        #sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #timer-box { background: #fff5f5; border: 2px solid var(--danger); border-radius: 8px; padding: 15px; text-align: center; margin-bottom: 20px; }
        #timer-display { font-size: 28px; font-weight: bold; color: var(--danger); }
        
        /* Tracker Grid */
        .tracker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; overflow-y: auto; padding-right: 5px; }
        .q-box { aspect-ratio: 1/1; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; background: #eee; font-size: 13px; transition: 0.2s; }
        .q-box.answered { background: var(--success) !important; color: white; border-color: var(--success); }
        .q-box.active { border: 2.5px solid var(--secondary); font-weight: bold; }

        /* Main Test Area */
        #main-test { flex-grow: 1; display: none; flex-direction: column; padding: 40px; overflow-y: auto; }
        .question-card { background: white; padding: 35px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 850px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        #section-tag { font-size: 12px; text-transform: uppercase; color: var(--secondary); font-weight: bold; letter-spacing: 1px; margin-bottom: 10px; }
        #question-text { font-size: 19px; line-height: 1.6; color: var(--primary); margin-bottom: 25px; min-height: 60px; }
        
        .option { margin: 12px 0; padding: 15px; border: 1px solid #e0e0e0; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .option:hover { background: #f8fbff; border-color: var(--secondary); }
        .option.selected { background: #eef7ff; border: 2px solid var(--secondary); font-weight: 500; }
        
        .nav-controls { display: flex; justify-content: space-between; max-width: 850px; margin: 25px auto; width: 100%; }
        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .btn-next { background: var(--secondary); color: white; }
        .btn-prev { background: #95a5a6; color: white; }
        .btn-finish { background: var(--success); color: white; width: 100%; margin-top: 20px; }

        #results-screen { display: none; text-align: center; padding: 60px; max-width: 600px; margin: 100px auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-card">
        <h2>Candidate Login</h2>
        <input type="text" id="stuName" placeholder="Full Name">
        <input type="text" id="stuRoll" placeholder="Roll Number">
        <input type="email" id="stuEmail" placeholder="Email ID">
        <input type="password" id="adminPass" placeholder="Admin Password">
        <button class="btn btn-finish" onclick="startTest()">Start Examination</button>
    </div>
</div>

<div id="sidebar">
    <div id="timer-box">
        <div style="font-size: 12px; color: #666;">TIME REMAINING</div>
        <div id="timer-display">120:00</div>
    </div>
    <div class="tracker-grid" id="tracker"></div>
    <button class="btn btn-finish" onclick="confirmSubmit()">Submit Test</button>
</div>

<div id="main-test">
    <div id="test-content">
        <div class="question-card">
            <div id="section-tag">Section</div>
            <p id="question-text">Loading...</p>
            <div id="options-container"></div>
        </div>
        <div class="nav-controls">
            <button class="btn btn-prev" onclick="changeQuestion(-1)">Previous</button>
            <button class="btn btn-next" onclick="changeQuestion(1)">Next Question</button>
        </div>
    </div>
    <div id="results-screen">
        <h1 style="color: var(--success);">Submission Successful</h1>
        <p>Your responses and score have been recorded.</p>
        <div style="font-size: 40px; margin: 30px 0; font-weight: bold;" id="score-val">0 / 60</div>
        <button class="btn btn-next" onclick="location.reload()">Exit</button>
    </div>
</div>

<script>
    // CONFIGURATION
    const ADMIN_PASSWORD = "RPS89";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz7c19iCwzRPBBk0VYp3AuTbqg8hPawCUX0QBstqWVSnD4Rq4OjqV0lE1SQazsF4xrE/exec"; 
    
    const questions = [
        // LOGICAL REASONING (1-20)
        {q: "1. What is the next number in the series: 5, 11, 23, 47, 95, ?", o: ["190", "191", "189", "192"], a: 1, s: "Logical"},
        {q: "2. In a certain code, COMPUTER is written as RFUVQNPC. How is MEDICINE written?", o: ["EOJDEJFM", "EOJDJEFM", "MFEJDJOE", "MFEDJJOE"], a: 1, s: "Logical"},
        {q: "3. If FRIEND is coded as HUMJTK, how is CANDLE written?", o: ["EDRIRL", "DCQHQK", "ESJFME", "FYOBOC"], a: 0, s: "Logical"},
        {q: "4. A man walks 30m South, turns left and walks 40m, then turns left again and walks 30m. How far is he from the start?", o: ["30m", "40m", "70m", "100m"], a: 1, s: "Logical"},
        {q: "5. Pointing to a man, a woman said, 'His mother is the only daughter of my mother.' How is she related to the man?", o: ["Sister", "Grandmother", "Mother", "Daughter"], a: 2, s: "Logical"},
        {q: "6. Arrange in sequence: 1. Job, 2. Examination, 3. Education, 4. Application, 5. Salary", o: ["3, 2, 4, 1, 5", "3, 4, 2, 1, 5", "1, 2, 3, 4, 5", "4, 2, 3, 5, 1"], a: 0, s: "Logical"},
        {q: "7. Find the odd one out: Leopard, Cougar, Lion, Cheetah, Wolf", o: ["Leopard", "Cougar", "Lion", "Wolf"], a: 3, s: "Logical"},
        {q: "8. Statement: All windows are doors. No door is a wall. Conclusion: I. No window is a wall. II. No wall is a door.", o: ["Only I follows", "Only II follows", "Both follow", "Neither follows"], a: 2, s: "Logical"},
        {q: "9. If 1st January 2012 was a Sunday, what day was 1st January 2013?", o: ["Monday", "Tuesday", "Wednesday", "Sunday"], a: 1, s: "Logical"},
        {q: "10. Find the blank: F2, __, D8, C16, B32", o: ["E3", "E4", "G4", "D4"], a: 1, s: "Logical"},
        {q: "11. Find the missing number: 7, 15, 31, 63, 127, ?", o: ["254", "255", "256", "253"], a: 1, s: "Logical"},
        {q: "12. Circular Seating: B is between F and D; E is between A and C; A is to the left of D. Who is between F and C?", o: ["A", "E", "B", "D"], a: 0, s: "Logical"},
        {q: "13. Assertion: Steam engines were invented in the Industrial Revolution. Reason: They were needed to pump water from mines.", o: ["Both true, R explains A", "Both true, R doesn't explain A", "A true, R false", "A false, R true"], a: 0, s: "Logical"},
        {q: "14. Analogy: PORK : PIG :: ?", o: ["ROOSTER : CHICKEN", "MUTTON : SHEEP", "STEER : BEEF", "LOBSTER : CRUSTACEAN"], a: 1, s: "Logical"},
        {q: "15. Odd one out: 64, 125, 216, 343, 512, 1100", o: ["125", "343", "1100", "512"], a: 2, s: "Logical"},
        {q: "16. If 'Rain' is 'Water', 'Water' is 'Road', 'Road' is 'Cloud', 'Cloud' is 'Sky', 'Sky' is 'Sea', where do planes fly?", o: ["Road", "Sea", "Cloud", "Sky"], a: 1, s: "Logical"},
        {q: "17. A 3x3x3 cube is painted red and cut into 27 small cubes. How many have zero faces painted?", o: ["1", "3", "6", "0"], a: 0, s: "Logical"},
        {q: "18. What is the angle between clock hands at 3:40?", o: ["120°", "125°", "130°", "135°"], a: 2, s: "Logical"},
        {q: "19. Complete the analogy: 8 : 512 :: 9 : ?", o: ["729", "810", "648", "900"], a: 0, s: "Logical"},
        {q: "20. If 5472 = 9, 6342 = 6, 7584 = 6, then what is 9236 = ?", o: ["2", "3", "4", "5"], a: 0, s: "Logical"},

        // QUANTITATIVE APTITUDE (21-40)
        {q: "21. A sum of money at simple interest amounts to $815 in 3 years and to $854 in 4 years. The sum is:", o: ["$650", "$690", "$698", "$700"], a: 2, s: "Quant"},
        {q: "22. A fruit seller had 420 apples left after selling 40%. Originally, he had:", o: ["588", "600", "672", "700"], a: 3, s: "Quant"},
        {q: "23. If 20% of a = b, then b% of 20 is the same as:", o: ["4% of a", "5% of a", "20% of a", "None"], a: 0, s: "Quant"},
        {q: "24. A train running at 60 km/hr crosses a pole in 9 seconds. Length of the train?", o: ["120 m", "180 m", "324 m", "150 m"], a: 3, s: "Quant"},
        {q: "25. A and B in 12 days, B and C in 15 days, C and A in 20 days. Together they take:", o: ["5 days", "10 days", "12 days", "15 days"], a: 1, s: "Quant"},
        {q: "26. The average of first five multiples of 3 is:", o: ["3", "9", "12", "15"], a: 1, s: "Quant"},
        {q: "27. Toffees at 6 for a rupee. To gain 20%, sell how many for a rupee?", o: ["3", "4", "5", "6"], a: 2, s: "Quant"},
        {q: "28. Probability of sum 7 with two dice:", o: ["1/6", "5/36", "1/12", "1/9"], a: 0, s: "Quant"},
        {q: "29. Ratio of ages A:B is 3:5. Sum is 80. A's age is:", o: ["30", "40", "50", "60"], a: 0, s: "Quant"},
        {q: "30. Equivalent single discount for 20% and 10%:", o: ["30%", "28%", "25%", "22%"], a: 1, s: "Quant"},
        {q: "31. H.C.F is 11, L.C.M is 693. One number is 77, find other:", o: ["99", "101", "44", "66"], a: 0, s: "Quant"},
        {q: "32. Pump fills in 2h, leak makes it 2.33h. Leak drains in:", o: ["7h", "8h", "12h", "14h"], a: 3, s: "Quant"},
        {q: "33. If log10 2 = 0.3010, then log10 80 is:", o: ["1.6020", "1.9030", "3.9030", "None"], a: 1, s: "Quant"},
        {q: "34. CP of 20 = SP of x. Profit 25%. x is:", o: ["15", "16", "18", "25"], a: 1, s: "Quant"},
        {q: "35. Boat speed 13, stream 4. Time for 68km downstream:", o: ["2h", "3h", "4h", "5h"], a: 2, s: "Quant"},
        {q: "36. Diagonal sqrt(41), area 20. Perimeter is:", o: ["9 cm", "18 cm", "20 cm", "41 cm"], a: 1, s: "Quant"},
        {q: "37. Ways to arrange 'LEADER':", o: ["72", "144", "360", "720"], a: 2, s: "Quant"},
        {q: "38. Weekday on 15th August 1947:", o: ["Sat", "Fri", "Thu", "Wed"], a: 1, s: "Quant"},
        {q: "39. A runs 22.5m, B runs 25m. In 1km race, B beats A by:", o: ["100m", "111m", "25m", "50m"], a: 0, s: "Quant"},
        {q: "40. If 3^(x-y) = 27 and 3^(x+y) = 243, then x is:", o: ["0", "2", "4", "6"], a: 2, s: "Quant"},

        // VERBAL (41-60)
        {q: "41. Synonym of 'ABANDON':", o: ["Keep", "Forsake", "Cherish", "Enforce"], a: 1, s: "Verbal"},
        {q: "42. Antonym of 'ENORMOUS':", o: ["Soft", "Tiny", "Weak", "Average"], a: 1, s: "Verbal"},
        {q: "43. Correct spelling:", o: ["Efficient", "Eficient", "Efficent", "Effecient"], a: 0, s: "Verbal"},
        {q: "44. Analogy: Embarrassed : Humiliated :: Frightened : ?", o: ["Terrified", "Agitated", "Courageous", "Reckless"], a: 0, s: "Verbal"},
        {q: "45. 'Leave no stone unturned' means:", o: ["Act strange", "Try every possible course", "Get fired", "Build wall"], a: 1, s: "Verbal"},
        {q: "46. Sentence Correction: 'He is as tall as, if not taller than, his brother.'", o: ["as tall as his brother", "taller than", "No correction required"], a: 2, s: "Verbal"},
        {q: "47. Fill in: 'The scientist was _____ by the results.'", o: ["astonished", "astonishing", "astonish", "astonishment"], a: 0, s: "Verbal"},
        {q: "48. One word: 'Person indifferent to pleasure or pain.'", o: ["Stoic", "Epicurean", "Egoist", "Sadist"], a: 0, s: "Verbal"},
        {q: "49. Correct spelling:", o: ["Occurrence", "Ocurrence", "Occurence", "Occureance"], a: 0, s: "Verbal"},
        {q: "50. Fill in: 'I have not seen him _____ last Monday.'", o: ["for", "since", "from", "till"], a: 1, s: "Verbal"},
        {q: "51. Synonym of 'CANDID':", o: ["Secretive", "Frank", "Devious", "Ambiguous"], a: 1, s: "Verbal"},
        {q: "52. Passive: 'The police caught the thief.'", o: ["The thief caught police", "The thief was caught by police", "Thief has been caught"], a: 1, s: "Verbal"},
        {q: "53. Antonym of 'ARTIFICIAL':", o: ["Natural", "Redundant", "Truthful", "Solid"], a: 0, s: "Verbal"},
        {q: "54. Fill in: 'Success depends _____ hard work.'", o: ["over", "at", "on", "for"], a: 2, s: "Verbal"},
        {q: "55. Error: 'Each of the students (A) / are required (B) / to submit their assignment (C).'", o: ["A", "B", "C", "No error"], a: 1, s: "Verbal"},
        {q: "56. 'To cry wolf' means:", o: ["Listen eagerly", "False alarm", "Turn pale", "Starvation"], a: 1, s: "Verbal"},
        {q: "57. Collective: 'A _____ of ships.'", o: ["Fleet", "Pack", "Swarm", "Shoal"], a: 0, s: "Verbal"},
        {q: "58. Synonym of 'DEFER':", o: ["Indifferent", "Defy", "Postpone", "Differ"], a: 2, s: "Verbal"},
        {q: "59. Indirect: He said, 'I am unwell.'", o: ["He said he is unwell", "He said he was unwell", "He says he is unwell"], a: 1, s: "Verbal"},
        {q: "60. Fill in: 'Neither the principal nor the teachers _____ present.'", o: ["is", "were", "was", "has"], a: 1, s: "Verbal"}
    ];

    let currentIndex = 0;
    let answers = new Array(60).fill(null);
    let timeLeft = 120 * 60;
    let timerInterval;

    function startTest() {
        const pass = document.getElementById('adminPass').value;
        const name = document.getElementById('stuName').value;
        const roll = document.getElementById('stuRoll').value;
        const email = document.getElementById('stuEmail').value;

        if (pass !== ADMIN_PASSWORD) { alert("Incorrect Admin Password!"); return; }
        if (!name || !roll || !email) { alert("Please complete all candidate details!"); return; }

        document.getElementById('login-page').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('main-test').style.display = 'flex';
        
        initTracker();
        startTimer();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                submitTest(true);
            }
        }, 1000);
    }

    function initTracker() {
        const tracker = document.getElementById('tracker');
        for (let i = 0; i < 60; i++) {
            const div = document.createElement('div');
            div.className = 'q-box';
            div.id = 'nav-' + i;
            div.innerText = i + 1;
            div.onclick = () => { currentIndex = i; renderQuestion(); };
            tracker.appendChild(div);
        }
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentIndex];
        document.getElementById('section-tag').innerText = q.s;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = '';
        
        q.o.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option' + (answers[currentIndex] === i ? ' selected' : '');
            div.innerHTML = `<span style="width:25px; font-weight:bold">${String.fromCharCode(65+i)}.</span> ${opt}`;
            div.onclick = () => selectOption(i);
            optContainer.appendChild(div);
        });

        document.querySelectorAll('.q-box').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + currentIndex).classList.add('active');
    }

    function selectOption(idx) {
        answers[currentIndex] = idx;
        document.getElementById('nav-' + currentIndex).classList.add('answered');
        renderQuestion();
    }

    function changeQuestion(dir) {
        currentIndex = Math.max(0, Math.min(59, currentIndex + dir));
        renderQuestion();
    }

    function confirmSubmit() {
        const remaining = 60 - answers.filter(a => a !== null).length;
        if (confirm(`You have ${remaining} questions left. Submit anyway?`)) submitTest();
    }

    async function submitTest(auto = false) {
        clearInterval(timerInterval);
        if (auto) alert("Timer expired. Test submitted automatically.");
        
        let score = 0;
        questions.forEach((q, i) => { if (answers[i] === q.a) score++; });

        document.getElementById('test-content').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        document.getElementById('score-val').innerText = `${score} / 60`;

        const payload = {
            name: document.getElementById('stuName').value,
            roll: document.getElementById('stuRoll').value,
            email: document.getElementById('stuEmail').value,
            score: score
        };

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
        } catch (e) {
            console.log("Network error - score displayed but sheet may not have updated.");
        }
    }
</script>
</body>
</html>
