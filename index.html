<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.Tech Placement Mock Test</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Login Overlay */
        #login-page { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 1000; color: white; }
        .login-card { background: white; color: #333; padding: 40px; border-radius: 12px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        /* Sidebar & Timer */
        #sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #timer-display { font-size: 24px; font-weight: bold; color: #e74c3c; text-align: center; margin-bottom: 20px; padding: 10px; border: 2px solid #e74c3c; border-radius: 8px; }
        
        /* Main UI */
        .tracker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; overflow-y: auto; }
        .q-box { aspect-ratio: 1/1; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; background: #eee; }
        .q-box.answered { background: var(--success) !important; color: white; }
        .q-box.active { border: 2.5px solid var(--secondary); }

        #main-test { flex-grow: 1; display: none; flex-direction: column; padding: 40px; overflow-y: auto; }
        .question-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .option { margin: 12px 0; padding: 15px; border: 1px solid #e0e0e0; border-radius: 8px; cursor: pointer; }
        .option.selected { background: #eef7ff; border: 2px solid var(--secondary); }
        
        .btn-submit { background: var(--success); color: white; padding: 15px; width: 100%; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #results { display: none; text-align: center; margin-top: 100px; width: 100%; }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-card">
        <h2 style="margin-top:0">Candidate Login</h2>
        <input type="text" id="stuName" placeholder="Full Name">
        <input type="text" id="stuRoll" placeholder="Roll Number">
        <input type="email" id="stuEmail" placeholder="Email ID">
        <input type="password" id="adminPass" placeholder="Admin Password (RPS89)">
        <button class="btn-submit" onclick="startTest()">Start Examination</button>
    </div>
</div>

<div id="sidebar">
    <div id="timer-display">120:00</div>
    <div class="tracker-grid" id="tracker"></div>
    <button class="btn-submit" onclick="confirmSubmit()">Manual Submit</button>
</div>

<div id="main-test">
    <div id="test-content">
        <div class="question-card">
            <div id="section-title" style="color:var(--secondary); font-weight:bold"></div>
            <p id="question-text"></p>
            <div id="options"></div>
        </div>
        <div style="display:flex; justify-content:space-between; max-width:800px; margin:20px auto; width:100%">
            <button onclick="changeQuestion(-1)" style="padding:10px 20px">Previous</button>
            <button onclick="changeQuestion(1)" style="padding:10px 20px; background:var(--secondary); color:white; border:none; border-radius:4px">Next</button>
        </div>
    </div>
    <div id="results">
        <h1>Test Submitted!</h1>
        <p>Your results have been recorded in the database.</p>
        <h2 id="final-score"></h2>
    </div>
</div>

<script>
    // --- INSERT YOUR GOOGLE WEB APP URL HERE ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyJrFrRaLA7RF1x3KLNZocpIDcSxqjpFdC70jm7fxB-cifyMmBz1vpt64ihXgk4ObDV/exec"; 
    
    const questions = [
        {q: "1. Next number in series: 5, 11, 23, 47, 95, ?", o: ["190", "191", "189", "192"], a: 1, s: "Logical"},
        // ... (Keep the rest of your 60 questions here)
    ];

    let currentIndex = 0;
    let answers = new Array(60).fill(null);
    let timeLeft = 120 * 60;
    let timerInterval;

    function startTest() {
        const pass = document.getElementById('adminPass').value;
        const name = document.getElementById('stuName').value;
        const roll = document.getElementById('stuRoll').value;
        const email = document.getElementById('stuEmail').value;

        if(pass !== "RPS89") { alert("Invalid Admin Password!"); return; }
        if(!name || !roll || !email) { alert("Please fill all details!"); return; }

        document.getElementById('login-page').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('main-test').style.display = 'flex';
        
        initTracker();
        startTimer();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                submitTest(true);
            }
        }, 1000);
    }

    function initTracker() {
        const tracker = document.getElementById('tracker');
        for (let i = 0; i < 60; i++) {
            const div = document.createElement('div');
            div.className = 'q-box';
            div.id = 'nav-' + i;
            div.innerText = i + 1;
            div.onclick = () => { currentIndex = i; renderQuestion(); };
            tracker.appendChild(div);
        }
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentIndex] || {q:"Question Data Missing", o:["","","",""], s:"General"};
        document.getElementById('section-title').innerText = q.s;
        document.getElementById('question-text').innerText = q.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        q.o.forEach((opt, i) => {
            const d = document.createElement('div');
            d.className = 'option' + (answers[currentIndex] === i ? ' selected' : '');
            d.innerText = opt;
            d.onclick = () => { answers[currentIndex] = i; document.getElementById('nav-'+currentIndex).classList.add('answered'); renderQuestion(); };
            optDiv.appendChild(d);
        });
        document.querySelectorAll('.q-box').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + currentIndex).classList.add('active');
    }

    function changeQuestion(step) {
        currentIndex = Math.max(0, Math.min(59, currentIndex + step));
        renderQuestion();
    }

    function confirmSubmit() { if(confirm("Submit test now?")) submitTest(); }

    async function submitTest(isAuto = false) {
        clearInterval(timerInterval);
        if(isAuto) alert("Time is up! Your test is being submitted automatically.");
        
        let score = 0;
        questions.forEach((q, i) => { if(answers[i] === q.a) score++; });

        document.getElementById('test-content').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('final-score').innerText = `Score: ${score} / 60`;

        // Save to Google Sheet
        const payload = {
            name: document.getElementById('stuName').value,
            roll: document.getElementById('stuRoll').value,
            email: document.getElementById('stuEmail').value,
            score: score
        };

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
        } catch(e) { console.error("Error saving data"); }
    }
</script>
</body>
</html>
